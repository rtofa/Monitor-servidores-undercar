version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: undercar_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: undercar_api
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8005:8000"

volumes:
  postgres_data: